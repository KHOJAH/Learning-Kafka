server:
  port: 8082

spring:
  application:
    name: kafka-mastery-project
  
  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    
    # Producer Configuration
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        linger.ms: 5
        compression.type: snappy
        enable.idempotence: true
    
    # Consumer Configuration
    consumer:
      group-id: kafka-mastery-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        isolation.level: read_committed
    
    # Admin Configuration
    admin:
      properties:
        bootstrap.servers: localhost:9092

  # SQL Server Database Configuration (for Outbox pattern and Saga examples)
  datasource:
    url: jdbc:sqlserver://localhost:1433;encrypt=true;trustServerCertificate=true;
    driverClassName: com.microsoft.sqlserver.jdbc.SQLServerDriver
    username: sa
    password: YourStrong@Passw0rd!
    hikari:
      initialization-fail-timeout: 60000

  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        hibernate:
          jdbc:
            batch_size: 50
          order_inserts: true
          order_updates: true

# Actuator Configuration for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

# Application-specific Kafka topics configuration
kafka:
  topics:
    order:
      created: order-created
      confirmed: order-confirmed
      cancelled: order-cancelled
    payment:
      processed: payment-processed
      failed: payment-failed
    inventory:
      reserved: inventory-reserved
      released: inventory-released
    notification:
      email: notification-email
      sms: notification-sms
    retry:
      max-attempts: 3
      initial-delay-ms: 1000
      backoff-multiplier: 2
      max-delay-ms: 10000
    dlt:
      enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.learning.kafka: DEBUG
    org.springframework.kafka: DEBUG
    org.apache.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
